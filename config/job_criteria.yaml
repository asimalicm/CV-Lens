job_title: "Senior Python Developer"

required_skills:
  - "Python"
  - "FastAPI"
  - "PostgreSQL"
  - "Docker"
  - "REST API design"
  - "Git"

preferred_skills:
  - "Kubernetes"
  - "Redis"
  - "AWS or GCP"
  - "CI/CD pipelines"
  - "React or any frontend framework"

minimum_experience_years: 3

education_requirement: "Bachelor's degree in Computer Science, Software Engineering, or equivalent practical experience"

key_responsibilities:
  - "Design, build, and maintain high-performance REST APIs using FastAPI"
  - "Write clean, testable Python code with unit and integration tests"
  - "Manage relational databases (PostgreSQL) including schema design and query optimisation"
  - "Containerise applications using Docker and deploy them reliably"
  - "Collaborate with cross-functional teams using Git and code review practices"
  - "Participate in architecture discussions and technical decision-making"
